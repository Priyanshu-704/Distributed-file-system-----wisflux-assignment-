version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pipeline_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pipeline-network

  redis:
    image: redis:7-alpine
    container_name: pipeline_redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pipeline-network

  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    container_name: pipeline_minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minio_password_123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pipeline-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pipeline_backend
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: 5432
      POSTGRES_HOST: postgres
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ENDPOINT: minio
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minio_admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio_password_123}
      MINIO_BUCKET: ${MINIO_BUCKET:-pipeline-uploads}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
      - shared_uploads:/usr/src/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - pipeline-network

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: pipeline_worker
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: 5432
      POSTGRES_HOST: postgres
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ENDPOINT: minio
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minio_admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio_password_123}
      MINIO_BUCKET: ${MINIO_BUCKET:-pipeline-uploads}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
    volumes:
      - ./worker:/usr/src/app
      - /usr/src/app/node_modules
      - shared_uploads:/usr/src/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - pipeline-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pipeline_frontend
    restart: unless-stopped
    ports:
      - "${VITE_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV}
      VITE_PORT: ${VITE_PORT}
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - pipeline-network

  pgweb:
    image: sosedoff/pgweb:latest
    container_name: pipeline_pgweb
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - PGWEB_DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pipeline-network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: pipeline_redis_commander
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - pipeline-network


networks:
  pipeline-network:
    name: pipeline_network
    driver: bridge

volumes:
  postgres_data:
    name: pipeline_postgres_data
  redis_data:
    name: pipeline_redis_data
  shared_uploads:
    name: pipeline_shared_uploads
  minio_data:
    name: pipeline_minio_data
